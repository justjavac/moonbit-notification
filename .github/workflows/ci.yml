name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  native-test:
    name: native-${{ matrix.flag }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            flag: windows
            coverage_file: coverage-windows.xml

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install MoonBit on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install Linux notification dependency
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libnotify-bin

      - name: Show MoonBit version
        shell: bash
        run: moon version --all

      - name: Sync generated files
        shell: bash
        run: |
          moon info src --target native
          moon fmt

      - name: Run tests with coverage
        shell: bash
        run: |
          moon test --target native --enable-coverage
          moon coverage analyze -p notification -- -f cobertura -o "${{ matrix.coverage_file }}"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./${{ matrix.coverage_file }}
          flags: ${{ matrix.flag }}
          name: native-${{ matrix.flag }}
          disable_search: true
          fail_ci_if_error: true
          verbose: true
